appname = egresados_service
httpport = ${EGRESADOS_SERVICE_HTTP_PORT||8081}
runmode = ${EGRESADOS_SERVICE_RUNMODE||prod}
autorender = false
copyrequestbody = true
EnableDocs = true
parameterStore = ${PARAMETER_STORE}

# Dependencias externas (helpers/http_client.go, middleware/jwt.go)
CrudService = ${EGRESADOS_SERVICE_CRUD_URL||http://localhost:8080/v1}
AutenticacionService = ${EGRESADOS_SERVICE_AUTENTICACION_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/autenticacion_mid/v1}
ParametrosService = ${EGRESADOS_SERVICE_PARAMETROS_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/parametros/v1}
AmazonService = ${EGRESADOS_SERVICE_AMAZON_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/administrativa_amazon_api/v1}
Wso2UserService = ${EGRESADOS_SERVICE_USERINFO_URL||https://autenticacion.portaloas.udistrital.edu.co/oauth2/userinfo}
Wso2JwksService = ${EGRESADOS_SERVICE_JWKS_URL||https://autenticacion.portaloas.udistrital.edu.co/oauth2/jwks}
TercerosService = ${EGRESADOS_SERVICE_TERCEROS_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/terceros_crud/v1}
SgaMidService = ${EGRESADOS_SERVICE_SGA_MID_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/sga_mid/v1}
GestorDocumentalService = ${EGRESADOS_SERVICE_GESTOR_DOCUMENTAL_URL||https://autenticacion.portaloas.udistrital.edu.co/apioas/gestor_documental_mid/v1}

# Flags de desarrollo local (NUNCA en prod)
ValidarJWT = ${EGRESADOS_SERVICE_VALIDAR_JWT||true}
ParametrosLocal = ${EGRESADOS_SERVICE_PARAMETROS_LOCAL||false}
