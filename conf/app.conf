appname = egresados_service
httpport = ${EGRESADOS_SERVICE_HTTP_PORT||8081}
runmode = ${EGRESADOS_SERVICE_RUN_MODE||prod}
autorender = false
copyrequestbody = true
parameterStore = ${PARAMETER_STORE}

# Dependencias externas (helpers/http_client.go, middleware/jwt.go) — sin default
# quemado: si la env var no está seteada, el endpoint queda vacío y la llamada
# falla explícito, en vez de pegarle en silencio a un servicio institucional real.
CrudService = ${EGRESADOS_SERVICE_CRUD_URL}
AutenticacionService = ${EGRESADOS_SERVICE_AUTENTICACION_URL}
ParametrosService = ${EGRESADOS_SERVICE_PARAMETROS_URL}
AmazonService = ${EGRESADOS_SERVICE_AMAZON_URL}
Wso2UserService = ${EGRESADOS_SERVICE_USERINFO_URL}
Wso2JwksService = ${EGRESADOS_SERVICE_JWKS_URL}
TercerosService = ${EGRESADOS_SERVICE_TERCEROS_URL}
SgaMidService = ${EGRESADOS_SERVICE_SGA_MID_URL}
GestorDocumentalService = ${EGRESADOS_SERVICE_GESTOR_DOCUMENTAL_URL}
AcademicaJbpmService = ${EGRESADOS_SERVICE_ACADEMICA_JBPM_URL}

# Flags de desarrollo local (NUNCA en prod)
ValidarJWT = ${EGRESADOS_SERVICE_VALIDAR_JWT||true}
ParametrosLocal = ${EGRESADOS_SERVICE_PARAMETROS_LOCAL||false}
